name: Meta

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/switch-stuffs-dependencies:latest

    steps:
      - name: Checkout nxlinks
        uses: actions/checkout@v4

      - name: Checkout nut
        uses: actions/checkout@v4
        with:
          repository: blawar/nut
          path: nut

      - name: Checkout titledn
        uses: actions/checkout@v4
        with:
          repository: blawar/titledb
          path: titledb

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y libcurl4-openssl-dev libssl-dev python3-dev python3-pip
          pip3 install -r nut/requirements.txt

      - name: Generate Metadata
        run: |
          git -C titledb pull
          python3 nut.py -U --import-region US --language en
