name: Meta

on:
  workflow_dispatch:

jobs:
  Generating:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nxlinks
        uses: actions/checkout@v4

      - name: Checkout nut
        uses: actions/checkout@v4
        with:
          repository: blawar/nut
          path: nut

      - name: Checkout titledb
        uses: actions/checkout@v4
        with:
          repository: blawar/titledb
          path: titledb

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y libcurl4-openssl-dev libssl-dev python3-dev python3-pip
          pip3 install -r nut/requirements.txt

      - name: Generate Metadata
        run: |
          git -C titledb pull
          curl https://files.prodkeys.net/ProdKeys.net-v20.0.1.zip -so keys.zip
          unzip keys.zip -x title.keys -d nut
          python3 nut/nut.py -U --import-region US --language en
