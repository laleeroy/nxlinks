name: Meta

on:
  workflow_dispatch:

jobs:
  Generating Metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nxlinks
        uses: actions/checkout@v4

      - name: Checkout nut
        uses: actions/checkout@v4
        with:
          repository: blawar/nut
          path: nut

      - name: Checkout titledb
        uses: actions/checkout@v4
        with:
          repository: blawar/titledb
          path: titledb

      - name: Install Dependencies
        run: |
          pip3 install -r nut/requirements.txt

      - name: Generate Metadata
        run: |
          git -C titledb pull
          python3 nut/nut.py -U --import-region US --language en
